naftiko: "1.0.0-alpha1"

info:
  label: "Visio JavaScript API"
  description: >-
    Shared capability definition for the Visio JavaScript API. Provides access
    to Visio document elements including pages, shapes, shape data, hyperlinks,
    comments, and application settings for diagrams embedded in SharePoint Online.
  tags:
    - Add-Ins
    - Diagrams
    - JavaScript
    - Microsoft 365
    - Office
    - SharePoint
    - Visualization
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VISIO_EMBEDDED_SESSION: VISIO_EMBEDDED_SESSION

capability:
  consumes:
    - type: http
      namespace: visio-javascript
      baseUri: https://appsforoffice.microsoft.com/embedded/1.0
      description: "Visio JavaScript API for Office Add-ins embedded in SharePoint Online"
      authentication:
        type: apikey
        key: X-Embedded-Session
        value: "{{VISIO_EMBEDDED_SESSION}}"
        placement: header
      resources:
        - name: documents
          path: /document
          description: "Visio document management operations"
          operations:
            - name: get-document
              method: GET
              description: "Get the current Visio document"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: pages
          path: /document/pages
          description: "Page listing and management operations"
          operations:
            - name: list-pages
              method: GET
              description: "List all pages in the Visio document"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-active-page
              method: GET
              description: "Get the currently active page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: page
          path: /document/pages/{pageName}
          description: "Individual page operations"
          operations:
            - name: get-page
              method: GET
              description: "Get a specific Visio page by name"
              inputParameters:
                - name: pageName
                  in: path
                  type: string
                  required: true
                  description: "Name of the Visio page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-page-view
              method: PATCH
              description: "Update page view zoom settings"
              inputParameters:
                - name: pageName
                  in: path
                  type: string
                  required: true
                  description: "Name of the Visio page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  zoom: "{{tools.zoom}}"
        - name: shapes
          path: /document/pages/{pageName}/shapes
          description: "Shape listing operations per page"
          operations:
            - name: list-shapes
              method: GET
              description: "List all shapes on a Visio page"
              inputParameters:
                - name: pageName
                  in: path
                  type: string
                  required: true
                  description: "Name of the Visio page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: shape
          path: /document/pages/{pageName}/shapes/{shapeId}
          description: "Individual shape operations"
          operations:
            - name: get-shape
              method: GET
              description: "Get a specific shape by ID"
              inputParameters:
                - name: pageName
                  in: path
                  type: string
                  required: true
                  description: "Name of the Visio page"
                - name: shapeId
                  in: path
                  type: integer
                  required: true
                  description: "Numeric ID of the shape"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: shape-data-items
          path: /document/pages/{pageName}/shapes/{shapeId}/shapeDataItems
          description: "Shape structured data operations"
          operations:
            - name: list-shape-data-items
              method: GET
              description: "List all data items for a shape"
              inputParameters:
                - name: pageName
                  in: path
                  type: string
                  required: true
                  description: "Name of the Visio page"
                - name: shapeId
                  in: path
                  type: integer
                  required: true
                  description: "Numeric ID of the shape"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: shape-hyperlinks
          path: /document/pages/{pageName}/shapes/{shapeId}/hyperlinks
          description: "Shape hyperlink operations"
          operations:
            - name: list-shape-hyperlinks
              method: GET
              description: "List all hyperlinks on a shape"
              inputParameters:
                - name: pageName
                  in: path
                  type: string
                  required: true
                  description: "Name of the Visio page"
                - name: shapeId
                  in: path
                  type: integer
                  required: true
                  description: "Numeric ID of the shape"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: shape-comments
          path: /document/pages/{pageName}/shapes/{shapeId}/comments
          description: "Shape comment operations"
          operations:
            - name: list-shape-comments
              method: GET
              description: "List all comments on a shape"
              inputParameters:
                - name: pageName
                  in: path
                  type: string
                  required: true
                  description: "Name of the Visio page"
                - name: shapeId
                  in: path
                  type: integer
                  required: true
                  description: "Numeric ID of the shape"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: application
          path: /document/application
          description: "Application host settings"
          operations:
            - name: get-application
              method: GET
              description: "Get Visio application settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-application
              method: PATCH
              description: "Update Visio application settings"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  showToolbars: "{{tools.showToolbars}}"

  exposes:
    - type: rest
      port: 8100
      namespace: visio-javascript-rest
      resources:
        - path: /v1/document
          name: document
          description: "Visio document"
          operations:
            - method: GET
              name: get-document
              description: "Get the current Visio document"
              call: "visio-javascript.get-document"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pages
          name: pages
          description: "Visio pages"
          operations:
            - method: GET
              name: list-pages
              description: "List all pages"
              call: "visio-javascript.list-pages"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/pages/{pageName}/shapes
          name: shapes
          description: "Shapes on a Visio page"
          operations:
            - method: GET
              name: list-shapes
              description: "List all shapes on a page"
              call: "visio-javascript.list-shapes"
              with:
                pageName: "rest.pageName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: visio-javascript-mcp
      transport: http
      tools:
        - name: get-document
          description: "Get current Visio document properties"
          hints:
            readOnly: true
            idempotent: true
          call: "visio-javascript.get-document"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-pages
          description: "List all pages in the Visio document"
          hints:
            readOnly: true
            idempotent: true
          call: "visio-javascript.list-pages"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-shapes
          description: "List all shapes on a Visio page"
          hints:
            readOnly: true
            idempotent: true
          call: "visio-javascript.list-shapes"
          with:
            pageName: "tools.pageName"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-shape
          description: "Get a specific shape by ID"
          hints:
            readOnly: true
            idempotent: true
          call: "visio-javascript.get-shape"
          with:
            pageName: "tools.pageName"
            shapeId: "tools.shapeId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-shape-data-items
          description: "List structured data items for a shape"
          hints:
            readOnly: true
            idempotent: true
          call: "visio-javascript.list-shape-data-items"
          with:
            pageName: "tools.pageName"
            shapeId: "tools.shapeId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-shape-hyperlinks
          description: "List hyperlinks attached to a shape"
          hints:
            readOnly: true
            idempotent: true
          call: "visio-javascript.list-shape-hyperlinks"
          with:
            pageName: "tools.pageName"
            shapeId: "tools.shapeId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-shape-comments
          description: "List comments on a shape"
          hints:
            readOnly: true
            idempotent: true
          call: "visio-javascript.list-shape-comments"
          with:
            pageName: "tools.pageName"
            shapeId: "tools.shapeId"
          outputParameters:
            - type: object
              mapping: "$."
